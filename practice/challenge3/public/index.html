<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge 3</title>
</head>
<body>
  <header>
    <h1>Hello from Challenge 3 🚀</h1>
  </header>

  <main>
    <p>This page is being served by a Node.js HTTP server.</p>
    <ul>
      <li>Served with <code>node:http</code></li>
      <li>File read using <code>node:fs/promises</code></li>
      <li>Static file from the <code>public/</code> folder</li>
    </ul>
    <button id="clickMe">Click me</button>
    <p id="output"></p>
  </main>

  <script>
    document.getElementById("clickMe").addEventListener("click", () => {
      document.getElementById("output").textContent = "Button clicked! 🎉";
    });
  </script>
</body>
</html>
