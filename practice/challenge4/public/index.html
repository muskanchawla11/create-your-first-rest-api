<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenge 4</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Hello from Challenge 4 🎨</h1>
    <p>This page is styled by an external CSS file served by Node.</p>
  </header>

  <main>
    <div class="card">
      <h2>It works!</h2>
      <p>If you can see colors and styling, your server is serving the CSS correctly.</p>
      <button id="clickMe">Click me</button>
      <p id="output"></p>
    </div>
  </main>

  <script>
    document.getElementById("clickMe").addEventListener("click", () => {
      document.getElementById("output").textContent = "Button clicked! 🎉";
    });
  </script>
</body>
</html>
